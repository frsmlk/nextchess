<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #262522;
      color: #e0dfdc;
      padding: 16px;
    }

    /* ─ Header ─ */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo {
      width: 22px; height: 22px;
      border-radius: 4px;
      background: #81b64c;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #1a1a17;
      font-family: 'Courier New', monospace;
    }

    .header h1 {
      font-size: 13px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      font-family: 'Courier New', monospace;
      color: #e0dfdc;
    }

    .header .ver {
      margin-left: auto;
      font-size: 9px; color: rgba(255,255,255,0.2);
      font-family: 'Courier New', monospace;
    }

    /* ─ Fields ─ */
    .field { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 9px; font-weight: 600;
      color: rgba(255,255,255,0.35);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: 'Courier New', monospace;
    }

    input[type="password"], select {
      width: 100%;
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      color: #e0dfdc;
      font-size: 12px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: rgba(129,182,76,0.4);
    }

    select { cursor: pointer; }
    select option { background: #262522; }

    /* ─ Checkboxes ─ */
    .check {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }

    .check input[type="checkbox"] {
      width: 14px; height: 14px;
      accent-color: #81b64c;
      cursor: pointer;
    }

    .check label {
      margin: 0; text-transform: none; font-weight: 400;
      font-size: 11px; color: rgba(255,255,255,0.6);
      letter-spacing: 0; font-family: inherit;
      cursor: pointer;
    }

    /* ─ Range ─ */
    .range-row {
      display: flex; align-items: center; gap: 8px;
    }

    input[type="range"] {
      flex: 1; accent-color: #81b64c;
      cursor: pointer;
    }

    .range-val {
      font-size: 13px; font-weight: 700;
      color: #81b64c; min-width: 16px; text-align: center;
      font-family: 'Courier New', monospace;
    }

    /* ─ Button ─ */
    .save-btn {
      width: 100%;
      padding: 9px;
      background: rgba(129,182,76,0.15);
      color: #81b64c;
      border: 1px solid rgba(129,182,76,0.25);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    .save-btn:hover {
      background: rgba(129,182,76,0.25);
      border-color: rgba(129,182,76,0.4);
    }

    .save-btn:active { transform: scale(0.98); }

    /* ─ Status ─ */
    .status {
      text-align: center;
      font-size: 10px;
      margin-top: 8px;
      min-height: 14px;
      font-family: 'Courier New', monospace;
      transition: opacity 0.2s;
    }
    .status.ok { color: #81b64c; }
    .status.err { color: #e5856d; }

    /* ─ Footer ─ */
    .foot {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.04);
      text-align: center;
      font-size: 9px;
      color: rgba(255,255,255,0.12);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">N</div>
    <h1>NextChess</h1>
    <span class="ver">v1.0</span>
  </div>

  <div class="field">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  </div>

  <div class="field">
    <label>Model</label>
    <select id="model">
      <option value="claude-haiku-4-5-20251001">Haiku 4.5 — fast</option>
      <option value="claude-sonnet-4-6-20250514">Sonnet 4.6 — deeper</option>
    </select>
  </div>

  <div class="field">
    <label>Best Moves to Show</label>
    <div class="range-row">
      <input type="range" id="numLines" min="1" max="5" value="3">
      <span class="range-val" id="numLinesVal">3</span>
    </div>
  </div>

  <div class="check">
    <input type="checkbox" id="autoExplain">
    <label for="autoExplain">Auto-explain on move change</label>
  </div>

  <div class="check">
    <input type="checkbox" id="showWorst" checked>
    <label for="showWorst">Show worst move arrow</label>
  </div>

  <button class="save-btn" id="saveBtn">Save</button>
  <div class="status" id="status"></div>

  <div class="foot">Powered by Claude</div>

  <script src="popup.js"></script>
</body>
</html>
